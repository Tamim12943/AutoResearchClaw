project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0
  graceful_degradation: true

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  wire_api: "chat_completions"
  api_key_env: ""
  api_key: ""
  # Preferred local model chain for AMD RX 6700 XT (12GB VRAM)
  # Switch to your exact local tag if needed.
  primary_model: "gemma3:12b"
  fallback_models:
    - "gemma3:4b"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  # AMD-friendly default: local sandbox (not Docker GPU passthrough).
  # Docker mode is still available; set mode: "docker" and use image below.
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/Scripts/python.exe"  # Linux/macOS: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  docker:
    image: "researchclaw/experiment:rocm"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "setup_only"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false
  figure_agent:
    enabled: true
    min_figures: 3
    max_figures: 8
    max_iterations: 3
    render_timeout_sec: 30
    docker_image: "researchclaw/experiment:rocm"
    output_format: "python"
    nano_banana_enabled: false
    strict_mode: false
    dpi: 300

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
