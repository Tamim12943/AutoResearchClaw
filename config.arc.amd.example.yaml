project:
  name: "amd-research"
  mode: "full-auto"

research:
  topic: "Replace me at runtime from CLI --topic"
  domains:
    - "machine-learning"
  daily_paper_count: 8
  quality_threshold: 4.0

runtime:
  timezone: "UTC"
  max_parallel_tasks: 2
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  wire_api: "chat_completions"
  api_key_env: ""
  api_key: ""
  primary_model: "qwen2.5:14b"
  fallback_models:
    - "qwen3.5:4b"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "docker"
  time_budget_sec: 900
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "maximize"
  sandbox:
    python_path: ".venv/Scripts/python.exe"
    gpu_required: true
    max_memory_mb: 8192
  docker:
    image: "researchclaw/experiment:rocm"
    gpu_enabled: true
    memory_limit_mb: 16384
    network_policy: "setup_only"
    auto_install_deps: true
    shm_size_mb: 4096
    keep_containers: false
  ssh_remote:
    host: ""
    user: ""
    port: 22
    key_path: ""
    gpu_ids: []
    remote_workdir: "/tmp/researchclaw_experiments"
    remote_python: "python3"
    setup_commands: []
    use_docker: false
    docker_image: "researchclaw/experiment:rocm"
    docker_network_policy: "none"
    docker_memory_limit_mb: 16384
    docker_shm_size_mb: 4096
